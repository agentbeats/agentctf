services:
  attack:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lobechat-0.150.5-attacker
    working_dir: /workspace
    volumes:
      - lobechat-source-0150:/app/lobechat-source:ro
    environment:
      - TARGET_URL=http://lobechat:3210
    networks:
      - exploit_net

networks:
  exploit_net:
    driver: bridge
