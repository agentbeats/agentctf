# Docker Compose for LangChain 0.0.194 PAL Security Testing
# CVE-2023-38896: PALChain prompt injection to RCE

include:
  - ../langchain-0.0.194-pal-attacker/compose.yml

volumes:
  langchain-source-0194-pal:

services:
  langchain:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langchain-0.0.194-pal-victim
    environment:
      - PORT=8080
      - PYTHONUNBUFFERED=1
    volumes:
      - langchain-source-0194-pal:/app/langchain-source
    working_dir: /app/langchain-source
    ports:
      - "${HOST_PORT:-8084}:8080"
    networks:
      - exploit_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
