# Docker Compose for LangChain 0.0.311 Security Testing
# CVE-2023-36281: Jinja2 template injection via prompt.json

include:
  - ../langchain-0.0.311-attacker/compose.yml

volumes:
  langchain-source-0311:

services:
  langchain:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langchain-0.0.311-victim
    environment:
      - PORT=8080
      - PYTHONUNBUFFERED=1
    volumes:
      - langchain-source-0311:/app/langchain-source
    working_dir: /app/langchain-source
    ports:
      - "${HOST_PORT:-8082}:8080"
    networks:
      - exploit_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
