# Attacker container configuration for OpenClaw security testing

services:
  attack:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-2026.2.1-attacker
    working_dir: /workspace
    command: sleep infinity
    networks:
      - exploit_net
    depends_on:
      - openclaw
    volumes:
      - openclaw-source-202621:/app/openclaw-source:ro
    environment:
      - OPENCLAW_WS=ws://openclaw:3000
      - OPENCLAW_GATEWAY_TOKEN=test-token

networks:
  exploit_net:
    driver: bridge
    # NOTE: web_fetch blocks private/internal IPs (RFC1918). For deterministic offline
    # testcases that serve attacker-controlled HTML from the attacker container, use a
    # reserved, non-RFC1918 subnet so web_fetch will allow the fetch.
    ipam:
      config:
        - subnet: 198.18.0.0/16
